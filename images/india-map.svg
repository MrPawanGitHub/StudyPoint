<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Title -->
  <text x="200" y="25" font-size="20" font-weight="bold" text-anchor="middle" fill="#326295">भारत का नक्शा (India Map)</text>
  
  <!-- Simplified India outline -->
  <path d="M 150 120 L 180 100 L 200 110 L 210 100 L 230 110 L 240 130 L 235 150 L 240 170 L 225 180 L 220 200 L 230 220 L 210 230 L 190 225 L 170 240 L 150 230 L 140 210 L 135 190 L 130 170 L 125 150 L 120 130 Z" 
        fill="#E8F5E9" stroke="#326295" stroke-width="2"/>
  
  <!-- North region marker -->
  <circle cx="175" cy="130" r="4" fill="#FF6B6B"/>
  <text x="185" y="135" font-size="12" fill="#FF6B6B">उत्तर (North)</text>
  
  <!-- South region marker -->
  <circle cx="200" cy="220" r="4" fill="#4ECDC4"/>
  <text x="210" y="225" font-size="12" fill="#4ECDC4">दक्षिण (South)</text>
  
  <!-- East region marker -->
  <circle cx="235" cy="170" r="4" fill="#FFE66D"/>
