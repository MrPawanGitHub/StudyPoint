  <!-- West region marker -->
  <circle cx="125" cy="170" r="4" fill="#95E1D3"/>
  <text x="80" y="175" font-size="12" fill="#95E1D3">पश्चिम (West)</text>
  
  <!-- Central region marker -->
  <circle cx="180" cy="170" r="3" fill="#F38181"/>
