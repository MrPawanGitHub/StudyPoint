<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <!-- Title -->
  <text x="200" y="25" font-size="20" font-weight="bold" text-anchor="middle" fill="#326295">बाघ (Tiger)</text>
  
  <!-- Body -->
  <ellipse cx="200" cy="200" rx="80" ry="100" fill="#FF8C42" stroke="#E74C3C" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="200" cy="90" r="50" fill="#FF8C42" stroke="#E74C3C" stroke-width="2"/>
  
  <!-- Ears -->
  <circle cx="160" cy="50" r="20" fill="#FF8C42" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="240" cy="50" r="20" fill="#FF8C42" stroke="#E74C3C" stroke-width="2"/>
  <circle cx="160" cy="50" r="12" fill="#FF6B6B"/>
  <circle cx="240" cy="50" r="12" fill="#FF6B6B"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="70" r="8" fill="white"/>
  <circle cx="220" cy="70" r="8" fill="white"/>
  <circle cx="182" cy="72" r="4" fill="black"/>
  <circle cx="222" cy="72" r="4" fill="black"/>
  
  <!-- Nose -->
  <circle cx="200" cy="95" r="6" fill="#FFB347"/>
  
  <!-- Mouth -->
  <path d="M 200 95 Q 190 105 180 100" stroke="#666" stroke-width="2" fill="none"/>
  <path d="M 200 95 Q 210 105 220 100" stroke="#666" stroke-width="2" fill="none"/>
  
  <!-- Stripes on body -->
  <path d="M 140 150 Q 145 170 140 190" stroke="#E74C3C" stroke-width="3" fill="none"/>
  <path d="M 160 140 Q 165 170 160 200" stroke="#E74C3C" stroke-width="3" fill="none"/>
  <path d="M 220 140 Q 225 170 220 200" stroke="#E74C3C" stroke-width="3" fill="none"/>
  <path d="M 240 150 Q 245 170 240 190" stroke="#E74C3C" stroke-width="3" fill="none"/>
  
  <!-- Front legs -->
  <rect x="170" y="270" width="18" height="60" fill="#FF8C42" stroke="#E74C3C" stroke-width="2"/>
  <rect x="212" y="270" width="18" height="60" fill="#FF8C42" stroke="#E74C3C" stroke-width="2"/>
  
  <!-- Paws -->
  <ellipse cx="179" cy="330" rx="12" ry="8" fill="#FF6B6B"/>
  <ellipse cx="221" cy="330" rx="12" ry="8" fill="#FF6B6B"/>
  
  <!-- Tail -->
  <path d="M 150 250 Q 120 260 110 300" stroke="#FF8C42" stroke-width="18" fill="none"/>
  <path d="M 150 250 Q 120 260 110 300" stroke="#E74C3C" stroke-width="2" fill="none"/>
  
  <!-- Scientific name -->
  <text x="200" y="340" font-size="14" text-anchor="middle" fill="#666" font-style="italic">Panthera tigris</text>
</svg>