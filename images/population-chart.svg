<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Title -->
  <text x="250" y="25" font-size="20" font-weight="bold" text-anchor="middle" fill="#326295">भारत की जनसंख्या (Population Chart)</text>
  
  <!-- Grid lines -->
  <line x1="50" y1="300" x2="450" y2="300" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="250" x2="450" y2="250" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="200" x2="450" y2="200" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="150" x2="450" y2="150" stroke="#ddd" stroke-width="1"/>
  <line x1="50" y1="100" x2="450" y2="100" stroke="#ddd" stroke-width="1"/>
  
  <!-- Axes -->
  <line x1="50" y1="50" x2="50" y2="300" stroke="#326295" stroke-width="2"/>
  <line x1="50" y1="300" x2="450" y2="300" stroke="#326295" stroke-width="2"/>
  
  <!-- Y-axis labels -->
  <text x="35" y="305" font-size="12" text-anchor="end" fill="#666">0</text>
  <text x="35" y="255" font-size="12" text-anchor="end" fill="#666">25 करोड़</text>
  <text x="35" y="205" font-size="12" text-anchor="end" fill="#666">50 करोड़</text>
  <text x="35" y="155" font-size="12" text-anchor="end" fill="#666">75 करोड़</text>
  <text x="35" y="105" font-size="12" text-anchor="end" fill="#666">100 करोड़</text>
  
  <!-- Bars for different regions -->
  <!-- North region -->
  <rect x="80" y="180" width="50" height="120" fill="#FF6B6B"/>
  <text x="105" y="320" font-size="12" text-anchor="middle" fill="#326295">उत्तर</text>
  
  <!-- South region -->
  <rect x="160" y="220" width="50" height="80" fill="#4ECDC4"/>
  <text x="185" y="320" font-size="12" text-anchor="middle" fill="#326295">दक्षिण</text>
  
  <!-- East region -->
  <rect x="240" y="170" width="50" height="130" fill="#FFE66D"/>
  <text x="265" y="320" font-size="12" text-anchor="middle" fill="#326295">पूर्व</text>
  
  <!-- West region -->
  <rect x="320" y="150" width="50" height="150" fill="#95E1D3"/>
  <text x="345" y="320" font-size="12" text-anchor="middle" fill="#326295">पश्चिम</text>
  
  <!-- Central region -->
  <rect x="400" y="190" width="40" height="110" fill="#F38181"/>
  <text x="420" y="320" font-size="12" text-anchor="middle" fill="#326295">मध्य</text>
</svg>